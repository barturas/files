<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Upload</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --accent: #e8ff47;
      --text: #e0e0e0;
      --muted: #666;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'IBM Plex Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2.5rem;
    }

    .drop-zone {
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(232, 255, 71, 0.03);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-family: var(--font-mono);
      font-size: 1.5rem;
      color: var(--muted);
      margin-bottom: 1rem;
      display: block;
    }

    .drop-label {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--muted);
    }

    .drop-label span {
      color: var(--accent);
    }

    .file-info {
      margin-top: 1.5rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--muted);
      min-height: 1.2em;
    }

    .file-info.selected {
      color: var(--text);
    }

    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: 2px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    button:not(:disabled):hover {
      opacity: 0.85;
    }

    .status {
      margin-top: 1.5rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      min-height: 1.2em;
      color: var(--muted);
    }

    .status.error { color: #ff6b6b; }
    .status.uploading { color: var(--accent); }

    .result {
      margin-top: 1.5rem;
      display: none;
    }

    .result.visible { display: block; }

    .result-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .url-row {
      display: flex;
      gap: 0.5rem;
    }

    .url-box {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.65rem 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .copy-btn {
      margin-top: 0;
      width: auto;
      padding: 0.65rem 1rem;
      flex-shrink: 0;
      font-size: 0.7rem;
    }

    .copy-btn.copied {
      background: #444;
      color: var(--accent);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>// file uploader</h1>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" />
      <span class="drop-icon">↑</span>
      <div class="drop-label">Drop a file or <span>browse</span></div>
    </div>

    <div class="file-info" id="fileInfo">No file selected</div>

    <button id="uploadBtn" disabled>Upload</button>

    <div class="status" id="status"></div>

    <div class="result" id="result">
      <div class="result-label">// generated url</div>
      <div class="url-row">
        <div class="url-box" id="urlBox"></div>
        <button class="copy-btn" id="copyBtn">Copy</button>
      </div>
    </div>

    <hr class="divider" />
  </div>

  <script>
    const WORKER_URL = 'https://upload-handler.arturas-berezniakovas.workers.dev';

    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const fileInfo = document.getElementById('fileInfo');
    const uploadBtn = document.getElementById('uploadBtn');
    const status = document.getElementById('status');
    const result = document.getElementById('result');
    const urlBox = document.getElementById('urlBox');
    const copyBtn = document.getElementById('copyBtn');

    let selectedFile = null;

    function setFile(file) {
      selectedFile = file;
      fileInfo.textContent = `${file.name} — ${(file.size / 1024).toFixed(1)} KB`;
      fileInfo.classList.add('selected');
      uploadBtn.disabled = false;
      result.classList.remove('visible');
      status.textContent = '';
      status.className = 'status';
    }

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });

    uploadBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      uploadBtn.disabled = true;
      status.textContent = 'Uploading...';
      status.className = 'status uploading';
      result.classList.remove('visible');

      try {
        const formData = new FormData();
        formData.append('file', selectedFile);

        const res = await fetch(WORKER_URL, { method: 'POST', body: formData });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        const data = await res.json();
        urlBox.textContent = data.url;
        result.classList.add('visible');
        status.textContent = 'Done.';
        status.className = 'status';
      } catch (err) {
        status.textContent = `Error: ${err.message}`;
        status.className = 'status error';
        uploadBtn.disabled = false;
      }
    });

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(urlBox.textContent).then(() => {
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy';
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    });
  </script>
</body>
</html>
